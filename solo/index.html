<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tattoi - Solo Artist Booking</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --bg-color: #0f172a;
            --accent-amber: #f59e0b;
            --accent-amber-hover: #d97706;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(245, 158, 11, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(245, 158, 11, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            box-sizing: border-box;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(to right, #f8fafc, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: #e2e8f0;
        }

        input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-amber);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            background: var(--accent-amber);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.3);
            margin-top: 1rem;
        }

        button:hover {
            background: var(--accent-amber-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .success-state {
            display: none;
            text-align: center;
            padding: 2rem 0;
            animation: slideUp 0.5s ease forwards;
        }

        .success-icon {
            font-size: 3rem;
            color: var(--accent-amber);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<div class="container" id="formContainer">
    <h1>Book a Session</h1>
    <p class="subtitle">Submit your tattoo concept and I'll get back to you.</p>

    <form id="bookingForm">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" required placeholder="John Doe">
        </div>
        
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="john@example.com">
        </div>

        <div class="form-group">
            <label for="concept">Tattoo Concept</label>
            <textarea id="concept" required placeholder="Describe your idea, style, and meaning..."></textarea>
        </div>

        <div class="form-group">
            <label for="placement">Placement & Size</label>
            <input type="text" id="placement" required placeholder="e.g., Forearm, ~5x5 inches">
        </div>

        <button type="submit">Submit Request</button>
    </form>
</div>

<div class="container success-state" id="successContainer">
    <div class="success-icon">✨</div>
    <h1>Request Received!</h1>
    <p class="subtitle" style="margin-bottom: 0;">Thanks for reaching out. I'll review your concept and get back to you shortly.</p>
</div>

<script>
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = this.querySelector('button');
        btn.textContent = 'Sending...';
        btn.style.opacity = '0.8';

        // Simulate API call
        setTimeout(() => {
            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('successContainer').style.display = 'block';
        }, 800);
    });
</script>

</body>
</html>
