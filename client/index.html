<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
  <link rel="icon" type="image/png" href="%VITE_APP_LOGO%" />
  <link rel="apple-touch-icon" href="%VITE_APP_LOGO%" />
  <link rel="manifest" href="/manifest.json" />

  <!-- PWA Meta Tags -->
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b1120" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TOI" />

  <title>%VITE_APP_TITLE%</title>

  <!-- OneSignal Web SDK for PWA -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  <!-- UI Variant Loader — defaults to 'clean'. Use ?ui=default to revert, ?ui=reset to clear. -->
  <script>
    (function() {
      var p = new URLSearchParams(location.search).get('ui');
      if (p === 'reset' || p === 'default') { sessionStorage.setItem('ui-variant', 'default'); return; }
      var v = p || sessionStorage.getItem('ui-variant') || 'clean';
      if (v === 'default') return;
      sessionStorage.setItem('ui-variant', v);
      document.documentElement.setAttribute('data-ui-variant', v);
      var l = document.createElement('link');
      l.rel = 'stylesheet'; l.href = '/themes/variant-' + v + '.css';
      document.head.appendChild(l);
    })();
  </script>
</head>

<body>
  <div id="select-portal-root" style="position: absolute; z-index: 9999;"></div>
  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>
  <script defer src="%VITE_ANALYTICS_ENDPOINT%/umami" data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
</body>

</html>
